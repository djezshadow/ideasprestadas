<style>

    html, body {
        height: auto;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        overflow-y: auto;
        overflow-x: hidden;
    }

    /* ── Fondo brillante (igual al de sobre-nosotros) ── */
    .contact-hero-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
            radial-gradient(ellipse 80% 60% at 50% -10%, rgba(80,100,255,.55) 0%, transparent 70%),
            radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,0,200,.4) 0%, transparent 60%);
    }

    .contact-page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding: max(40px, env(safe-area-inset-top, 40px)) 20px
                 max(60px, env(safe-area-inset-bottom, 60px));
    }

    /* ── Topbar ── */
    .contact-topbar {
        display: flex;
        align-items: center;
        gap: 14px;
        max-width: 960px;
        margin: 0 auto 56px;
        animation: slideDown .5s ease both;
    }

    @keyframes slideDown {
        from { opacity:0; transform: translateY(-16px); }
        to   { opacity:1; transform: translateY(0); }
    }

    .contact-back {
        color: rgba(255,255,255,.75);
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 700;
        padding: 9px 16px;
        border-radius: 50px;
        border: 1.5px solid rgba(255,255,255,.28);
        background: rgba(255,255,255,.08);
        backdrop-filter: blur(8px);
        transition: all .18s ease;
        white-space: nowrap;
    }
    .contact-back:hover { background: rgba(255,255,255,.18); color: white; transform: translateX(-2px); }

    a.contact-topbar-brand {
        text-decoration: none;
        transition: opacity .18s ease;
        -webkit-tap-highlight-color: transparent;
    }
    a.contact-topbar-brand:hover { opacity: .7; }

    .contact-topbar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .contact-topbar-brand img {
        width: 34px;
        filter: drop-shadow(0 0 10px rgba(255,255,255,.3));
    }
    .contact-topbar-brand span {
        color: white;
        font-size: 1.05rem;
        font-weight: 800;
    }

    /* ── Cuerpo principal ── */
    .contact-body {
        max-width: 560px;
        margin: 0 auto;
        text-align: center;
        animation: fadeUp .7s ease .1s both;
    }

    @keyframes fadeUp {
        from { opacity:0; transform: translateY(24px); }
        to   { opacity:1; transform: translateY(0); }
    }

    .contact-logo {
        width: 300px;
        max-width: 70vw;
        margin: 0 auto 36px;
        display: block;
        filter: drop-shadow(0 0 20px rgba(255,255,255,.2));
    }

    /* ── Card de contacto ── */
    .contact-card {
        background: rgba(255,255,255,.08);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 24px;
        padding: 38px 32px;
        margin-bottom: 40px;
    }

    .contact-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 0;
        border-bottom: 1px solid rgba(255,255,255,.08);
        text-align: left;
    }

    .contact-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
    }

    .contact-item:first-child {
        padding-top: 0;
    }

    .contact-icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: rgba(255,255,255,.1);
        border: 1px solid rgba(255,255,255,.18);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        flex-shrink: 0;
    }

    .contact-info {
        flex: 1;
    }

    .contact-label {
        color: rgba(255,255,255,.45);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 1.8px;
        text-transform: uppercase;
        margin-bottom: 3px;
    }

    .contact-value {
        color: rgba(255,255,255,.9);
        font-size: 0.95rem;
        font-weight: 500;
        word-break: break-all;
    }

    .contact-value a {
        color: rgba(255,255,255,.9);
        text-decoration: none;
        transition: color .15s ease;
    }
    .contact-value a:hover { color: white; text-decoration: underline; }
