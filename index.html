<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeuraScript</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- OVERLAY para cerrar sidebar en mobile -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">

    <!-- ═══════════════════════════════════════
         SIDEBAR
         ═══════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">

        <!-- Logo en sidebar -->
        <div class="sidebar-brand">
            <img src="img/Neura 1.png" class="sidebar-logo" alt="NeuraScript">
            <span class="sidebar-title">NeuraScript</span>
        </div>

        <!-- Nuevo chat -->
        <button class="sidebar-new-chat" id="newChatBtn">
            <span class="icon">✦</span>
            Nuevo chat
        </button>

        <!-- Historial -->
        <div class="sidebar-section-label">Recientes</div>
        <nav class="sidebar-history" id="historyList">
            <!-- Los ítems se agregan desde JS -->
            <p class="sidebar-empty">Tus conversaciones aparecerán acá.</p>
        </nav>

        <!-- Spacer -->
        <div class="sidebar-spacer"></div>

        <!-- Sección inferior -->
        <div class="sidebar-bottom">

            <a href="" class="sidebar-link">
                <span class="sidebar-link-icon">⚙</span>
                Configuración
            </a>

            <a href="" class="sidebar-link">
                <span class="sidebar-link-icon">✉</span>
                Contacto
            </a>

            <div class="sidebar-version">v1.0.0</div>

        </div>

    </aside>

    <!-- ═══════════════════════════════════════
         ÁREA PRINCIPAL
         ═══════════════════════════════════════ -->
    <div class="main">

        <!-- Topbar (visible en mobile) -->
        <div class="topbar">
            <button class="topbar-menu-btn" id="menuBtn" aria-label="Abrir menú">☰</button>
            <span class="topbar-title">NeuraScript</span>
            <div class="topbar-spacer"></div>
        </div>

        <!-- Logo central (solo en desktop, desaparece en mobile) -->
        <div class="logo-area" id="logoArea">
            <img src="img/Neura 1.png" class="logo" alt="NeuraScript">
            <div class="title">NeuraScript</div>
        </div>

        <!-- Chat -->
        <div class="chat-container">
            <div id="chat" class="chat"></div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-box">
                <input
                    id="messageInput"
                    placeholder="Escribe tu idea de guion..."
                    autocomplete="off"
                >
                <button id="sendBtn" class="send-btn" aria-label="Enviar">➤</button>
            </div>
        </div>

    </div><!-- /main -->

</div><!-- /layout -->

<script src="script.js"></script>
</body>
</html>
