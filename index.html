<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeuraScript</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Tap anywhere to dismiss keyboard on iPhone -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">

    <!-- ═══════════════════════════════════════
         SIDEBAR
         ═══════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-brand">
            <img src="img/Neura 1.png" class="sidebar-logo" alt="NeuraScript">
            <span class="sidebar-title">NeuraScript</span>
        </div>

        <!-- Usuario logueado -->
        <div class="sidebar-user">
            <span class="sidebar-user-icon">👤</span>
            <span class="sidebar-user-name" id="sidebarUsername">...</span>
            <button class="sidebar-logout-btn" id="logoutBtn" title="Cerrar sesión">↩</button>
        </div>

        <button class="sidebar-new-chat" id="newChatBtn">
            <span class="icon">✦</span>
            Nuevo chat
        </button>

        <div class="sidebar-section-label">Recientes</div>
        <nav class="sidebar-history" id="historyList">
            <p class="sidebar-empty">Tus conversaciones aparecerán acá.</p>
        </nav>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-bottom">
            <a href="sobre-nosotros.html" class="sidebar-link">
                <span class="sidebar-link-icon">🎬</span>
                Sobre Nosotros
            </a>
            <a href="" class="sidebar-link">
                <span class="sidebar-link-icon">⚙</span>
                Configuración
            </a>
            <a href="" class="sidebar-link">
                <span class="sidebar-link-icon">✉</span>
                Contacto
            </a>
            <div class="sidebar-version">v0.2.3</div>
        </div>

    </aside>

    <!-- ═══════════════════════════════════════
         ÁREA PRINCIPAL
         ═══════════════════════════════════════ -->
    <div class="main" id="mainArea">

        <!-- Topbar mobile -->
        <div class="topbar">
            <button class="topbar-menu-btn" id="menuBtn" aria-label="Abrir menú">☰</button>
            <span class="topbar-title">NeuraScript</span>
            <div class="topbar-spacer"></div>
        </div>

        <!-- Logo desktop -->
        <div class="logo-area">
            <img src="img/Neura 1.png" class="logo" alt="NeuraScript">
            <div class="title">NeuraScript</div>
        </div>

        <!-- Chat -->
        <div class="chat-container">
            <div id="chat" class="chat"></div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-box">
                <input
                    id="messageInput"
                    placeholder="Escribe tu idea de guion..."
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="sentences"
                >
                <button id="sendBtn" class="send-btn" aria-label="Enviar">➤</button>
            </div>
        </div>

        <!-- Fondo sólido debajo del input para tapar el gap de Safari -->
        <div class="safari-bottom-fill"></div>

    </div>

</div>

<script>
    /* Redirigir al login si no hay token */
    const _token = localStorage.getItem("ns_token");
    if (!_token) window.location.href = "auth.html";

    /* Tap en el área de chat para cerrar teclado en iPhone */
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("chat").addEventListener("touchstart", () => {
            document.getElementById("messageInput").blur();
        }, { passive: true });
    });
</script>
<script src="script.js"></script>
</body>
</html>
