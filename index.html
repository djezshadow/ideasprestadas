<!-- Tap anywhere to dismiss keyboard on iPhone -->

<script>
/* ─── Auth: siempre se entra directo. Login/Register es opcional. ─── */
const _token = localStorage.getItem("ns_token");
const _username = localStorage.getItem("ns_username");
const userArea = document.getElementById("sidebarUserArea");
const topbarLoginArea = document.getElementById("topbarLoginArea");

if (_token && _username) {
    /* Usuario con sesión iniciada */
    userArea.innerHTML = `
        <div class="sidebar-user">
            <span class="sidebar-user-icon">👤</span>
            <span class="sidebar-user-name">${_username}</span>
            <button class="sidebar-logout-btn" id="logoutBtn" title="Cerrar sesión">↩</button>
        </div>`;
    document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("ns_token");
        localStorage.removeItem("ns_username");
        window.location.reload();
    });
} else {
    /* Sin cuenta — mostrar acceso opcional */
    userArea.innerHTML = `
        <div class="sidebar-guest-badge">
            <span>👤 Invitado</span>
            <a href="auth.html">Iniciar sesión →</a>
        </div>`;
    topbarLoginArea.innerHTML = `<a href="auth.html" class="topbar-login-btn">Iniciar sesión</a>`;
}

/* ─── Tap en chat para cerrar teclado en iPhone ─── */
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("chat").addEventListener("touchstart", () => {
        document.getElementById("messageInput").blur();
    }, { passive: true });
});

/* ─── SPLASH ─── */
const splash    = document.getElementById("splash");
const splashBtn = document.getElementById("splashBtn");

/* Precargar audio apenas carga la página */
const introAudio = new Audio();
introAudio.preload = "auto";
introAudio.volume = 0.7;
introAudio.src = "sounds/Heavenly.mp3";
introAudio.load();

splashBtn.addEventListener("click", () => {
    /* 1. Sonido — arranca aquí mismo, directo al click del usuario */
    introAudio.currentTime = 0;
    introAudio.play().catch(() => {});

    /* 2. Ocultar fase 1 (botón), mostrar fase 2 (animación) */
    document.getElementById("splashPhase1").style.display = "none";
    document.getElementById("splashPhase2").classList.add("active");

    /* 3. Las animaciones CSS del logo/nombre/tagline corren solas.
          Después de ~2.3s cerramos el splash y mostramos el menú */
    setTimeout(() => {
        splash.classList.add("hidden");
        document.getElementById("welcomeOverlay").classList.remove("hidden");
    }, 2400);
});

/* ═══════════════════════════════════════════════════════════
   MENÚ PRINCIPAL — tres zonas editables
   ═══════════════════════════════════════════════════════════

   ZONA SUPERIOR: solo "Sobre Nosotros" (abre página nueva).
   Podés cambiar el icon, label o href.
   ─────────────────────────────────────────────────────────── */
const MENU_TOP = {
    icon:  "🎬",
    label: "Sobre Nosotros",
    key:   "__sobrenosotros__"   // clave interna — no la cambies
};

/* ═══════════════════════════════════════════════════════════
   ZONA CENTRAL: las 9 opciones del sandbox.
   ───────────────────────────────────────────────────────────
   Cada objeto tiene:
     icon  → emoji que aparece arriba del label
     label → texto del botón
     key   → palabra clave que se busca en BOT_RESPONSES
              (y en ALIASES) de script.js

   Para AGREGAR una opción: copiá un bloque { ... } con su coma.
   Para ELIMINAR una opción: borrá el bloque completo.
   Para CAMBIAR el contenido que muestra: editá BOT_RESPONSES
   en script.js buscando la key correspondiente.
   ─────────────────────────────────────────────────────────── */
const MENU_ITEMS = [
    { icon: "🎬", label: "Ficha Técnica",  key: "ficha tecnica"        },
    { icon: "📖", label: "Logline",        key: "logline"               },
    { icon: "📜", label: "Storyline",      key: "storyline"             },
    { icon: "🎨", label: "Moodboard",      key: "moodboard"             },
    { icon: "💰", label: "Presupuesto",    key: "presupuesto"           },
    { icon: "🤝", label: "Financiamiento", key: "financiacion"          },
    { icon: "🎭", label: "Elenco",         key: "elenco tentativo"      },
    { icon: "🗺️", label: "Recorrido",      key: "recorrido de mercados" },
    { icon: "🎞", label: "Teaser",         key: "teaser"                },
];

/* ═══════════════════════════════════════════════════════════
   ZONA INFERIOR: solo "Usar la IA" (desbloquea el chat).
   Podés cambiar el icon y el label, pero no el key "__ai__".
   ─────────────────────────────────────────────────────────── */
const MENU_BOTTOM = {
    icon:  "🤖",
    label: "Usar la IA"
};

/* ─── SANDBOX: render de respuesta dentro del overlay ─── */
const welcomeMenu    = document.getElementById("welcomeMenu");
const sandboxPanel   = document.getElementById("sandboxPanel");
const sandboxContent = document.getElementById("sandboxContent");
const sandboxBackBtn = document.getElementById("sandboxBackBtn");

function showSandbox(key) {
    /* Ocultar menú, mostrar panel */
    welcomeMenu.style.display = "none";
    sandboxPanel.classList.add("active");
    sandboxPanel.classList.remove("sandbox--fullscreen");
    sandboxContent.innerHTML = "";

    /* Render de la respuesta usando el mismo BOT_RESPONSES de script.js.
       Necesitamos esperar a que script.js esté cargado — usamos un pequeño
       retry si aún no está disponible. */
    function tryRender() {
        /* Caso especial: Sobre Nosotros se renderiza directo sin BOT_RESPONSES */
        if (key === "__sobrenosotros__") {
            const loader = document.createElement("div");
            loader.className = "message bot typing-indicator";
            loader.innerHTML = "<span></span><span></span><span></span>";
            sandboxContent.appendChild(loader);
            setTimeout(() => {
                loader.remove();
                renderSbSobreNosotros();
            }, 900);
            return;
        }

        if (typeof BOT_RESPONSES === "undefined") {
            return setTimeout(tryRender, 50);
        }

        /* Resolver alias */
        const resolvedKey = (typeof ALIASES !== "undefined" && ALIASES[key]) ? ALIASES[key] : key;
        const response = BOT_RESPONSES[resolvedKey];

        if (!response) {
            sandboxContent.innerHTML = `<div class="message bot" style="opacity:.7">No hay información disponible para esta sección todavía.</div>`;
            return;
        }

        /* Indicador de carga */
        const loader = document.createElement("div");
        loader.className = "message bot typing-indicator";
        loader.innerHTML = "<span></span><span></span><span></span>";
        sandboxContent.appendChild(loader);

        const delay = response.delay || 1200;

        setTimeout(() => {
            loader.remove();
            renderSandboxResponse(response, resolvedKey);
        }, delay);
    }
    tryRender();
}

function renderSandboxResponse(response, key) {
    /* Redirige al mismo sistema de render de script.js
       pero dentro de sandboxContent en lugar del chat global */

    /* Helper local para crear elementos dentro del sandbox */
    function sbAppend(el) {
        sandboxContent.appendChild(el);
    }
    function sbText(text) {
        const d = document.createElement("div");
        d.className = "message bot";
        d.textContent = text;
        sbAppend(d);
    }
    function sbScript(text) {
        const d = document.createElement("div");
        d.className = "message bot script";
        d.textContent = text;
        sbAppend(d);
    }
    function sbList(items) {
        const d = document.createElement("div");
        d.className = "message bot";
        const ul = document.createElement("ul");
        ul.className = "message-list";
        items.forEach(i => { const li = document.createElement("li"); li.textContent = i; ul.appendChild(li); });
        d.appendChild(ul);
        sbAppend(d);
    }

    /* Elegir variante */
    let content = response.content;
    if (response.multi && response.variants && response.variants.length > 0) {
        content = response.variants[Math.floor(Math.random() * response.variants.length)];
    }

    switch (response.type) {
        case "text":
            sbText(content);
            break;
        case "script":
            sbScript(content);
            break;
        case "list":
            sbList(content);
            break;
        case "ficha":
            renderSbFicha(response.content);
            break;
        case "presupuesto":
            renderSbPresupuesto(response.content);
            break;
        case "financiacion":
            renderSbFinanciacion(response.content);
            break;
        case "elenco":
            renderSbElenco(response.content);
            break;
        case "moodboard":
            renderSbMoodboard(response);
            break;
        case "recorrido":
            renderSbRecorrido();
            break;
        case "youtube":
            renderSbYoutube(response);
            break;
        case "qr":
            renderSbQR(response);
            break;
        default:
            sbText(content || "");
    }

    /* Lightbox en imágenes del sandbox */
    sandboxContent.querySelectorAll("img").forEach(img => {
        img.style.cursor = "zoom-in";
        img.addEventListener("click", () => {
            if (typeof openLightbox === "function") openLightbox(img.src);
        });
    });
}

/* ── Renders específicos para sandbox (misma lógica que script.js pero sin el chat global) ── */

function renderSbFicha(data) {
    const fields = [
        ["Nombre del Proyecto", data.proyecto],
        ["Formato",             data.formato],
        ["Género",              data.genero],
        ["Tono",                data.tono],
        ["Duración",            data.duracion],
        ["Directora",           data.directora],
        ["Productora",          data.productora],
        ["Guionista",           data.guionista],
        ["Público Objetivo",    data.publico]
    ];
    const div = document.createElement("div");
    div.className = "message bot ficha-card";
    div.innerHTML = `
        <div class="ficha-title">🎬 Ficha Técnica</div>
        <img src="img/ideasprestadas.webp" class="ficha-portada" alt="Portada" style="cursor:zoom-in" onerror="this.style.display='none'">
        <div class="ficha-subtitle">${data.proyecto}</div>
        <table class="ficha-table">
            ${fields.map(([k,v]) => `<tr><td class="ficha-key">${k}</td><td class="ficha-val">${v}</td></tr>`).join("")}
        </table>`;
    sandboxContent.appendChild(div);
}

function renderSbPresupuesto(data) {
    const div = document.createElement("div");
    div.className = "message bot presupuesto-card";
    div.innerHTML = `
        <div class="ficha-title">💰 Presupuesto Estimado</div>
        <div class="presupuesto-row">
            <span class="presupuesto-label">En Pesos Argentinos</span>
            <span class="presupuesto-amount ars">${data.ars}</span>
        </div>
        <div class="presupuesto-divider"></div>
        <div class="presupuesto-row">
            <span class="presupuesto-label">En Dólares</span>
            <span class="presupuesto-amount usd">${data.usd}</span>
        </div>`;
    sandboxContent.appendChild(div);
}

function renderSbFinanciacion(items) {
    const div = document.createElement("div");
    div.className = "message bot financiacion-card";
    div.innerHTML = `
        <div class="ficha-title">🤝 Financiación</div>
        <div class="financiacion-grid">
            ${items.map(item => `
                <div class="financiacion-item">
                    <div class="financiacion-foto">${item.foto ? `<img src="${item.foto}" alt="${item.nombre}">` : `<span>🏢</span>`}</div>
                    <div class="financiacion-nombre">${item.nombre}</div>
                </div>`).join("")}
        </div>`;
    sandboxContent.appendChild(div);
}

function renderSbElenco(actores) {
    const div = document.createElement("div");
    div.className = "message bot elenco-card";
    div.innerHTML = `
        <div class="ficha-title">🎭 Elenco Tentativo</div>
        <div class="elenco-grid">
            ${actores.map(a => `
                <div class="elenco-item">
                    <div class="elenco-foto">${a.foto ? `<img src="${a.foto}" alt="${a.nombre}" style="cursor:zoom-in">` : `<span>👤</span>`}</div>
                    <div class="elenco-nombre">${a.nombre}</div>
                    <div class="elenco-rol">${a.rol}</div>
                </div>`).join("")}
        </div>`;
    sandboxContent.appendChild(div);
}

function renderSbMoodboard(response) {
    const loader2 = document.createElement("div");
    loader2.className = "message bot typing-indicator";
    loader2.innerHTML = "<span></span><span></span><span></span>";
    sandboxContent.appendChild(loader2);

    setTimeout(() => {
        loader2.remove();
        [response.slide1, response.slide2].forEach((slide, si) => {
            const cols  = si === 0 ? 5 : 4;
            const label = `Slide ${si+1} — Moodboard (${slide.length} imágenes)`;
            const div = document.createElement("div");
            div.className = "message bot moodboard-block";
            div.innerHTML = `
                <div class="ficha-title">${label}</div>
                <div class="moodboard-grid" style="--cols:${cols}">
                    ${slide.map((src, i) => {
                        const isPaleta = (i === slide.length - 1);
                        return `<div class="moodboard-cell ${isPaleta ? "paleta-cell" : ""}">
                            ${src ? `<img src="${src}" alt="Imagen ${i+1}" style="cursor:zoom-in">` : `<div class="moodboard-placeholder">${isPaleta ? "🎨 Paleta" : (i+1)}</div>`}
                        </div>`;
                    }).join("")}
                </div>`;
            sandboxContent.appendChild(div);
            div.querySelectorAll("img").forEach(img => {
                img.addEventListener("click", () => { if (typeof openLightbox === "function") openLightbox(img.src); });
            });
        });
    }, 1800);
}

function renderSbRecorrido() {
    /* Reutilizar la misma función de script.js pero redirigiendo al sandboxContent */
    const paradas = [
        { nombre: "Mercado 1", lugar: "Ciudad, País", fecha: "Fecha", foto: "", color: "#fff" },
        { nombre: "Mercado 2", lugar: "Ciudad, País", fecha: "Fecha", foto: "", color: "#fff" },
        { nombre: "Mercado 3", lugar: "Ciudad, País", fecha: "Fecha", foto: "", color: "#fff" },
        { nombre: "Mercado 4", lugar: "Ciudad, País", fecha: "Fecha", foto: "", color: "#fff" },
        { nombre: "Mercado 5", lugar: "Ciudad, País", fecha: "Fecha", foto: "", color: "#fff" },
    ];
    const div = document.createElement("div");
    div.className = "message bot recorrido-block";
    div.innerHTML = `
        <div class="ficha-title">🗺️ Recorrido de Mercados</div>
        <div class="recorrido-timeline">
            ${paradas.map((p, i) => `
                <div class="recorrido-parada visible" style="animation-delay:${i * 0.18}s">
                    <div class="recorrido-dot" style="background:${p.color}"></div>
                    <div class="recorrido-line ${i === paradas.length-1 ? "last" : ""}"></div>
                    <div class="recorrido-info">
                        ${p.foto ? `<img src="${p.foto}" class="recorrido-foto" alt="${p.nombre}" style="cursor:zoom-in">` : ""}
                        <div class="recorrido-nombre">${p.nombre}</div>
                        <div class="recorrido-lugar">📍 ${p.lugar}</div>
                        <div class="recorrido-fecha">📅 ${p.fecha}</div>
                    </div>
                </div>`).join("")}
        </div>`;
    sandboxContent.appendChild(div);
}

function renderSbYoutube(response) {
    const div = document.createElement("div");
    div.className = "message bot youtube-block";
    div.innerHTML = `
        <div class="ficha-title">🎬 ${response.caption || "Video"}</div>
        <div class="youtube-wrapper">
            <iframe
                src="https://www.youtube.com/embed/${response.youtubeId}?rel=0"
                title="${response.caption || "Video"}"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen
            ></iframe>
        </div>`;
    sandboxContent.appendChild(div);
}

function renderSbQR(response) {
    const d = document.createElement("div");
    d.className = "message bot qr-block";
    const link = document.createElement("a");
    link.href = response.qrUrl || "#";
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    const img = document.createElement("img");
    img.src = "img/qr.png";
    img.alt = "Código QR";
    link.appendChild(img);
    const caption = document.createElement("p");
    caption.className = "qr-caption";
    caption.textContent = (response.caption || "") + " (tocá para abrir)";
    d.appendChild(link);
    d.appendChild(caption);
    sandboxContent.appendChild(d);
}

                 style="width:120px;margin:0 auto 10px;display:block;
                        filter:drop-shadow(0 0 14px rgba(255,255,255,.22))">
            <div class="ficha-title" style="margin-bottom:4px">El Equipo</div>
            <div style="color:rgba(255,255,255,.45);font-size:.78rem;letter-spacing:1.5px;
                        text-transform:uppercase;font-weight:700">5 Voces Producciones</div>
        </div>

        <!-- Equipo — grid de tarjetas con foto circular y bio -->
        <div class="sobre-nosotros-equipo-list">
            ${equipo.map(m => `
                <div class="sobre-nosotros-miembro">
                    ${m.foto
                        ? `<img src="${m.foto}" class="sobre-nosotros-foto" alt="${m.nombre}" onerror="this.style.display='none'">`
                        : `<div class="sobre-nosotros-foto-placeholder">👤</div>`
                    }
                    <div class="sobre-nosotros-info">
                        <div class="sobre-nosotros-nombre">${m.nombre}</div>
                        <div class="sobre-nosotros-rol">${m.rol}</div>
                        <div class="sobre-nosotros-bio">${m.bio}</div>
                    </div>
                </div>`).join("")}
        </div>

        <!-- Botón Ver Página Completa -->
        <a href="sobre-nosotros.html" target="_blank" class="sobre-nosotros-fullpage-btn">
            🎬 Ver Página Completa ↗
        </a>
    `;
    sandboxContent.appendChild(div);
}

/* ── Volver al menú desde el sandbox ── */
sandboxBackBtn.addEventListener("click", () => {
    sandboxPanel.classList.remove("active");
    sandboxPanel.classList.remove("sandbox--fullscreen");
    sandboxContent.innerHTML = "";
    welcomeMenu.style.display = "";
});

/* ── Construir los chips del menú ── */

/* — Zona superior: Sobre Nosotros — */
const welcomeTopEl = document.getElementById("welcomeTop");
(function() {
    const btn = document.createElement("button");
    btn.className = "welcome-chip welcome-chip--sobrenosotros";
    btn.innerHTML = `<span class="wc-icon">${MENU_TOP.icon}</span>${MENU_TOP.label}`;
    btn.addEventListener("click", () => {
        showSandbox(MENU_TOP.key);
    });
    welcomeTopEl.appendChild(btn);
})();

/* — Zona central: las 9 opciones editables (sandbox) — */
const welcomeChipsEl = document.getElementById("welcomeChips");
MENU_ITEMS.forEach(({ icon, label, key }) => {
    const btn = document.createElement("button");
    btn.className = "welcome-chip";
    btn.innerHTML = `<span class="wc-icon">${icon}</span>${label}`;
    btn.addEventListener("click", () => {
        /* Abre la respuesta en modo sandbox dentro del overlay */
        showSandbox(key);
    });
    welcomeChipsEl.appendChild(btn);
});

/* — Zona inferior: Usar la IA — */
const welcomeBottomEl = document.getElementById("welcomeBottom");
(function() {
    const btn = document.createElement("button");
    btn.className = "welcome-chip welcome-chip--ai";
    btn.innerHTML = `<span class="wc-icon">${MENU_BOTTOM.icon}</span>${MENU_BOTTOM.label}`;
    btn.addEventListener("click", () => {
        /* Único botón que cierra el overlay y habilita el chat */
        unlockChat();
    });
    welcomeBottomEl.appendChild(btn);
})();

/* ── Ir al menú principal (salteando la animación) ── */
function goHome() {
    /* 1. Resetear sandbox por si estaba abierto */
    sandboxPanel.classList.remove("active");
    sandboxPanel.classList.remove("sandbox--fullscreen");
    sandboxContent.innerHTML = "";
    welcomeMenu.style.display = "";

    /* 2. Cerrar sidebar mobile si está abierto */
    if (typeof closeSidebar === "function") closeSidebar();

    /* 3. Mostrar el overlay del menú directamente (sin splash) */
    document.getElementById("splash").classList.add("hidden");
    document.getElementById("welcomeOverlay").classList.remove("hidden");

    /* 4. Re-bloquear el chat (por si ya había entrado a "Usar la IA") */
    const mainArea = document.getElementById("mainArea");
    if (!mainArea.classList.contains("chat-locked")) {
        mainArea.classList.add("chat-locked");
        /* Reinsertar el overlay de bloqueo si fue eliminado */
        if (!document.getElementById("chatLockOverlay")) {
            const lock = document.createElement("div");
            lock.id = "chatLockOverlay";
            mainArea.insertBefore(lock, mainArea.firstChild);
        }
    }
}

/* Conectar los tres puntos de acceso al logo */
document.addEventListener("DOMContentLoaded", () => {
    ["logoHomeBtn", "logoHomeBtnDesktop", "logoHomeBtnMobile"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener("click", goHome);
    });
});

/* ── Detectar #menu en la URL al cargar (viene de sobre-nosotros) ── */
window.addEventListener("load", () => {
    if (window.location.hash === "#menu") {
        /* Limpiar el hash sin recargar */
        history.replaceState(null, "", window.location.pathname);
        /* Abrir el menú directamente */
        goHome();
    }
});

/* ── Desbloquear el chat (solo al elegir "Usar la IA") ── */
function unlockChat() {
    /* Cerrar overlay */
    document.getElementById("welcomeOverlay").classList.add("hidden");
    /* Quitar clase de bloqueo y el overlay */
    const mainArea = document.getElementById("mainArea");
    mainArea.classList.remove("chat-locked");
    const lockEl = document.getElementById("chatLockOverlay");
    if (lockEl) lockEl.remove();
    /* Foco en el input */
    setTimeout(() => document.getElementById("messageInput").focus(), 350);
}


</script>
<script src="script.js"></script>
</body>
