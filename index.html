<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeuraScript</title>
<link rel="stylesheet" href="style.css">
<!-- Precarga el audio para que esté listo antes de que el usuario toque Empezar -->
<link rel="preload" href="sounds/Heavenly.mp3" as="audio" type="audio/mpeg">
<style>

/* ═══════════════════════════════════════
   SPLASH SCREEN
   ═══════════════════════════════════════ */
#splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: linear-gradient(160deg, #0414ff 0%, #0000cc 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity .7s ease, visibility .7s ease;
}

#splash.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

/* Fase 1: solo el botón */
#splashPhase1 {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeIn .5s ease .1s both;
}

/* Fase 2: logo + nombre + tagline — oculto hasta que el usuario toca */
#splashPhase2 {
    display: none;
    flex-direction: column;
    align-items: center;
}

#splashPhase2.active { display: flex; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

.splash-logo {
    width: 120px;
    opacity: 0;
    transform: scale(0.6);
    filter: drop-shadow(0 0 40px rgba(255,255,255,.5));
    animation: splashLogoIn 1s cubic-bezier(.34,1.56,.64,1) .1s forwards;
}

@keyframes splashLogoIn {
    to { opacity: 1; transform: scale(1); }
}

.splash-name {
    color: white;
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: .5px;
    opacity: 0;
    transform: translateY(14px);
    margin-top: 18px;
    text-shadow: 0 4px 30px rgba(100,100,255,.4);
    animation: splashTextIn .7s ease .9s forwards;
}

.splash-tagline {
    color: rgba(255,255,255,.5);
    font-size: 0.95rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    margin-top: 8px;
    animation: splashTextIn .6s ease 1.3s forwards;
}

@keyframes splashTextIn {
    to { opacity: 1; transform: translateY(0); }
}

.splash-start-btn {
    padding: 20px 64px;
    background: white;
    color: #0000cc;
    border: none;
    border-radius: 50px;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: .3px;
    cursor: pointer;
    box-shadow: 0 8px 40px rgba(0,0,0,.25), 0 0 60px rgba(255,255,255,.15);
    transition: transform .18s ease, box-shadow .18s ease;
    -webkit-tap-highlight-color: transparent;
}

.splash-start-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 14px 50px rgba(0,0,0,.3), 0 0 80px rgba(255,255,255,.2);
}

.splash-start-btn:active { transform: scale(0.97); }

/* ═══════════════════════════════════════
   WELCOME OVERLAY — chips grandes
   ═══════════════════════════════════════ */
#welcomeOverlay {
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(0, 0, 180, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    animation: fade .35s ease;
    transition: opacity .4s ease, visibility .4s ease;
    overflow-y: auto;
}

#welcomeOverlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

/* welcomeMenu ocupa todo el overlay centrado */
#welcomeMenu {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

.welcome-heading {
    color: white;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 4px 20px rgba(0,0,200,.4);
}

.welcome-sub {
    color: rgba(255,255,255,.65);
    font-size: clamp(0.88rem, 2vw, 1rem);
    text-align: center;
    margin-bottom: 36px;
    max-width: 480px;
    line-height: 1.6;
}

.welcome-chips {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    max-width: 680px;
    width: 100%;
}

.welcome-chip {
    padding: 20px 14px;
    background: rgba(255,255,255,.12);
    border: 1.5px solid rgba(255,255,255,.28);
    border-radius: 18px;
    color: white;
    font-size: clamp(0.78rem, 1.5vw, 0.92rem);
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    line-height: 1.35;
    transition: background .18s ease, transform .15s ease, border-color .18s ease;
    -webkit-tap-highlight-color: transparent;
}

.welcome-chip:hover {
    background: rgba(255,255,255,.22);
    border-color: rgba(255,255,255,.55);
    transform: translateY(-3px);
}

.welcome-chip:active { transform: scale(0.96); }

.welcome-chip .wc-icon {
    display: block;
    font-size: 1.6rem;
    margin-bottom: 8px;
}

@media (max-width: 540px) {
    .welcome-chips {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }
    .welcome-chip { padding: 16px 10px; }
    .welcome-chip .wc-icon { font-size: 1.3rem; }
}

/* Opción destacada — Usar la IA */
.welcome-chip--ai {
    grid-column: 1 / -1;
    background: rgba(255,255,255,.22);
    border-color: rgba(255,255,255,.7);
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    padding: 22px 20px;
    letter-spacing: .2px;
    box-shadow: 0 0 40px rgba(255,255,255,.1), inset 0 1px 0 rgba(255,255,255,.25);
}

.welcome-chip--ai .wc-icon { font-size: 2rem; }

.welcome-chip--ai:hover {
    background: rgba(255,255,255,.35);
    transform: translateY(-4px);
    box-shadow: 0 8px 50px rgba(255,255,255,.18);
}

/* ═══════════════════════════════════════
   SANDBOX PANEL — respuesta dentro del overlay
   ═══════════════════════════════════════ */
#sandboxPanel {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px max(24px, env(safe-area-inset-bottom, 24px));
    overflow-y: auto;
    animation: sandboxIn .3s ease;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
}

#sandboxPanel.active {
    opacity: 1;
    pointer-events: all;
}

@keyframes sandboxIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
}

.sandbox-back-btn {
    align-self: flex-start;
    margin-bottom: 20px;
    padding: 9px 18px;
    background: rgba(255,255,255,.12);
    border: 1.5px solid rgba(255,255,255,.28);
    border-radius: 50px;
    color: rgba(255,255,255,.85);
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .18s ease;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
}
.sandbox-back-btn:hover {
    background: rgba(255,255,255,.22);
    color: white;
    transform: translateX(-2px);
}

.sandbox-content {
    width: 100%;
    max-width: 680px;
    animation: sandboxIn .35s ease .05s both;
}

/* Los mensajes bot dentro del sandbox usan los mismos estilos del chat */
.sandbox-content .message {
    margin-bottom: 12px;
}

/* ═══════════════════════════════════════
   CHAT BLOQUEADO — overlay sobre el área principal
   ═══════════════════════════════════════ */
#chatLockOverlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    cursor: not-allowed;
    border-radius: inherit;
}

.main { position: relative; }

/* Input y chips deshabilitados visualmente */
.chat-locked .input-area,
.chat-locked .chips-bar {
    opacity: 0.35;
    pointer-events: none;
    filter: blur(1px);
    user-select: none;
}

/* ═══════════════════════════════════════
   BOTÓN LOGIN en topbar (usuario invitado)
   ═══════════════════════════════════════ */
.topbar-login-btn {
    flex-shrink: 0;
    padding: 7px 14px;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.3);
    border-radius: 20px;
    color: white;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: background .18s ease;
    -webkit-tap-highlight-color: transparent;
}
.topbar-login-btn:hover { background: rgba(255,255,255,.28); }

/* Badge "Invitado" en sidebar */
.sidebar-guest-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: rgba(255,200,0,.1);
    border: 1px solid rgba(255,200,0,.2);
    border-radius: 10px;
    margin-bottom: 12px;
    color: rgba(255,220,100,.8);
    font-size: 0.8rem;
    font-weight: 600;
}

.sidebar-guest-badge a {
    color: rgba(255,220,100,.95);
    text-decoration: none;
    font-weight: 700;
    margin-left: auto;
    font-size: 0.75rem;
}

</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     SPLASH DE INTRO
     ══════════════════════════════════════════ -->
<div id="splash">
    <!-- Fase 1: solo el botón -->
    <div id="splashPhase1">
        <button class="splash-start-btn" id="splashBtn">✦ Empezar</button>
    </div>
    <!-- Fase 2: animación del logo (oculta hasta click) -->
    <div id="splashPhase2">
        <img src="img/Neura 1.png" class="splash-logo" alt="NeuraScript">
        <div class="splash-name">NeuraScript</div>
        <div class="splash-tagline">Tu asistente de guion</div>
    </div>
</div>

<!-- ══════════════════════════════════════════
     WELCOME OVERLAY — chips grandes
     ══════════════════════════════════════════ -->
<div id="welcomeOverlay" class="hidden">

    <!-- Vista principal: el menú de chips -->
    <div id="welcomeMenu">
        <div class="welcome-heading">¿Qué querés explorar?</div>
        <div class="welcome-sub">Elegí una sección del proyecto o usá la IA para escribir libremente.</div>
        <div class="welcome-chips" id="welcomeChips"></div>
    </div>

    <!-- Vista sandbox: respuesta de la opción elegida -->
    <div id="sandboxPanel">
        <button class="sandbox-back-btn" id="sandboxBackBtn">← Volver al menú</button>
        <div class="sandbox-content" id="sandboxContent"></div>
    </div>

</div>

<!-- Tap anywhere to dismiss keyboard on iPhone -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">

    <!-- ═══════════════════════════════════════
         SIDEBAR
         ═══════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-brand">
            <img src="img/Neura 1.png" class="sidebar-logo" alt="NeuraScript">
            <span class="sidebar-title">NeuraScript</span>
        </div>

        <!-- Usuario logueado o badge invitado — se inyecta por JS -->
        <div id="sidebarUserArea"></div>

        <button class="sidebar-new-chat" id="newChatBtn">
            <span class="icon">✦</span>
            Nuevo chat
        </button>

        <div class="sidebar-section-label">Recientes</div>
        <nav class="sidebar-history" id="historyList">
            <p class="sidebar-empty">Tus conversaciones aparecerán acá.</p>
        </nav>

        <button class="sidebar-clear-all" id="clearAllBtn" style="display:none">
            <span class="sidebar-link-icon">🗑</span>
            Borrar todo el historial
        </button>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-bottom">
            <a href="sobre-nosotros.html" class="sidebar-link">
                <span class="sidebar-link-icon">🎬</span>
                Sobre Nosotros
            </a>
            <a target="_blank" href="https://youtu.be/dQw4w9WgXcQ" class="sidebar-link">
                <span class="sidebar-link-icon">⚙</span>
                Configuración
            </a>
            <a target="_blank" href="https://youtu.be/dQw4w9WgXcQ" class="sidebar-link">
                <span class="sidebar-link-icon">✉</span>
                Contacto
            </a>
            <div class="sidebar-version">v1.0.0</div>
        </div>

    </aside>

    <!-- ═══════════════════════════════════════
         ÁREA PRINCIPAL
         ═══════════════════════════════════════ -->
    <div class="main chat-locked" id="mainArea">

        <!-- Bloqueo de chat hasta elegir "Usar la IA" -->
        <div id="chatLockOverlay"></div>

        <!-- Topbar mobile -->
        <div class="topbar">
            <button class="topbar-menu-btn" id="menuBtn" aria-label="Abrir menú">☰</button>
            <span class="topbar-title">NeuraScript</span>
            <div class="topbar-spacer"></div>
            <!-- Botón login para invitados -->
            <div id="topbarLoginArea"></div>
        </div>

        <!-- Logo desktop -->
        <div class="logo-area">
            <img src="img/Neura 1.png" class="logo" alt="NeuraScript">
            <div class="title">NeuraScript</div>
        </div>

        <!-- Chat -->
        <div class="chat-container">
            <div id="chat" class="chat"></div>
        </div>

        <!-- Chips de sugerencias (pequeños, siempre visibles) -->
        <div class="chips-bar" id="chipsBar"></div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-box">
                <input
                    id="messageInput"
                    placeholder="Escribe tu idea de guion..."
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="sentences"
                >
                <button id="sendBtn" class="send-btn" aria-label="Enviar">➤</button>
            </div>
        </div>

        <div class="safari-bottom-fill"></div>

    </div>

</div>

<script>
/* ─── Auth: siempre se entra directo. Login/Register es opcional. ─── */
const _token = localStorage.getItem("ns_token");
const _username = localStorage.getItem("ns_username");
const userArea = document.getElementById("sidebarUserArea");
const topbarLoginArea = document.getElementById("topbarLoginArea");

if (_token && _username) {
    /* Usuario con sesión iniciada */
    userArea.innerHTML = `
        <div class="sidebar-user">
            <span class="sidebar-user-icon">👤</span>
            <span class="sidebar-user-name">${_username}</span>
            <button class="sidebar-logout-btn" id="logoutBtn" title="Cerrar sesión">↩</button>
        </div>`;
    document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("ns_token");
        localStorage.removeItem("ns_username");
        window.location.reload();
    });
} else {
    /* Sin cuenta — mostrar acceso opcional */
    userArea.innerHTML = `
        <div class="sidebar-guest-badge">
            <span>👤 Invitado</span>
            <a href="auth.html">Iniciar sesión →</a>
        </div>`;
    topbarLoginArea.innerHTML = `<a href="auth.html" class="topbar-login-btn">Iniciar sesión</a>`;
}

/* ─── Tap en chat para cerrar teclado en iPhone ─── */
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("chat").addEventListener("touchstart", () => {
        document.getElementById("messageInput").blur();
    }, { passive: true });
});

/* ─── SPLASH ─── */
const splash    = document.getElementById("splash");
const splashBtn = document.getElementById("splashBtn");

/* Precargar audio apenas carga la página */
const introAudio = new Audio();
introAudio.preload = "auto";
introAudio.volume = 0.7;
introAudio.src = "sounds/Heavenly.mp3";
introAudio.load();

splashBtn.addEventListener("click", () => {
    /* 1. Sonido — arranca aquí mismo, directo al click del usuario */
    introAudio.currentTime = 0;
    introAudio.play().catch(() => {});

    /* 2. Ocultar fase 1 (botón), mostrar fase 2 (animación) */
    document.getElementById("splashPhase1").style.display = "none";
    document.getElementById("splashPhase2").classList.add("active");

    /* 3. Las animaciones CSS del logo/nombre/tagline corren solas.
          Después de ~2.3s cerramos el splash y mostramos el menú */
    setTimeout(() => {
        splash.classList.add("hidden");
        document.getElementById("welcomeOverlay").classList.remove("hidden");
    }, 2400);
});

/* ─── MENÚ PRINCIPAL (welcome overlay) ─── */
const MENU_ITEMS = [
    /* Opción especial — ir a la IA */
    { icon: "🤖", label: "Usar la IA",        key: "__ai__",               highlight: true },
    /* Secciones de la película */
    { icon: "🎬", label: "Ficha Técnica",      key: "ficha tecnica" },
    { icon: "📖", label: "Logline",            key: "logline" },
    { icon: "📜", label: "Storyline",          key: "storyline" },
    { icon: "🎨", label: "Moodboard",          key: "moodboard" },
    { icon: "💰", label: "Presupuesto",        key: "presupuesto" },
    { icon: "🤝", label: "Financiamiento",     key: "financiacion" },
    { icon: "🎭", label: "Elenco",             key: "elenco tentativo" },
    { icon: "🗺️", label: "Recorrido",          key: "recorrido de mercados" },
    { icon: "🎞", label: "Teaser",             key: "teaser" },
];

/* ─── SANDBOX: render de respuesta dentro del overlay ─── */
const welcomeMenu    = document.getElementById("welcomeMenu");
const sandboxPanel   = document.getElementById("sandboxPanel");
const sandboxContent = document.getElementById("sandboxContent");
const sandboxBackBtn = document.getElementById("sandboxBackBtn");

function showSandbox(key) {
    /* Ocultar menú, mostrar panel */
    welcomeMenu.style.display = "none";
    sandboxPanel.classList.add("active");
    sandboxContent.innerHTML = "";

    /* Render de la respuesta usando el mismo BOT_RESPONSES de script.js.
       Necesitamos esperar a que script.js esté cargado — usamos un pequeño
       retry si aún no está disponible. */
    function tryRender() {
        if (typeof BOT_RESPONSES === "undefined") {
            return setTimeout(tryRender, 50);
        }

        /* Resolver alias */
        const resolvedKey = (typeof ALIASES !== "undefined" && ALIASES[key]) ? ALIASES[key] : key;
        const response = BOT_RESPONSES[resolvedKey];

        if (!response) {
            sandboxContent.innerHTML = `<div class="message bot" style="opacity:.7">No hay información disponible para esta sección todavía.</div>`;
            return;
        }

        /* Indicador de carga */
        const loader = document.createElement("div");
        loader.className = "message bot typing-indicator";
        loader.innerHTML = "<span></span><span></span><span></span>";
        sandboxContent.appendChild(loader);

        const delay = response.delay || 1200;

        setTimeout(() => {
            loader.remove();
            renderSandboxResponse(response, resolvedKey);
        }, delay);
    }
    tryRender();
}

function renderSandboxResponse(response, key) {
    /* Redirige al mismo sistema de render de script.js
       pero dentro de sandboxContent en lugar del chat global */

    /* Helper local para crear elementos dentro del sandbox */
    function sbAppend(el) {
        sandboxContent.appendChild(el);
    }
    function sbText(text) {
        const d = document.createElement("div");
        d.className = "message bot";
        d.textContent = text;
        sbAppend(d);
    }
    function sbScript(text) {
        const d = document.createElement("div");
        d.className = "message bot script";
        d.textContent = text;
        sbAppend(d);
    }
    function sbList(items) {
        const d = document.createElement("div");
        d.className = "message bot";
        const ul = document.createElement("ul");
        ul.className = "message-list";
        items.forEach(i => { const li = document.createElement("li"); li.textContent = i; ul.appendChild(li); });
        d.appendChild(ul);
        sbAppend(d);
    }

    /* Elegir variante */
    let content = response.content;
    if (response.multi && response.variants && response.variants.length > 0) {
        content = response.variants[Math.floor(Math.random() * response.variants.length)];
    }

    switch (response.type) {
        case "text":
            sbText(content);
            break;
        case "script":
            sbScript(content);
            break;
        case "list":
            sbList(content);
            break;
        case "ficha":
            renderSbFicha(response.content);
            break;
        case "presupuesto":
            renderSbPresupuesto(response.content);
            break;
        case "financiacion":
            renderSbFinanciacion(response.content);
            break;
        case "elenco":
            renderSbElenco(response.content);
            break;
        case "moodboard":
            renderSbMoodboard(response);
            break;
        case "recorrido":
            renderSbRecorrido();
            break;
        case "youtube":
            renderSbYoutube(response);
            break;
        case "qr":
            renderSbQR(response);
            break;
        default:
            sbText(content || "");
    }

    /* Lightbox en imágenes del sandbox */
    sandboxContent.querySelectorAll("img").forEach(img => {
        img.style.cursor = "zoom-in";
        img.addEventListener("click", () => {
            if (typeof openLightbox === "function") openLightbox(img.src);
        });
    });
}

/* ── Renders específicos para sandbox (misma lógica que script.js pero sin el chat global) ── */

function renderSbFicha(data) {
    const fields = [
        ["Nombre del Proyecto", data.proyecto],
        ["Formato",             data.formato],
        ["Género",              data.genero],
        ["Tono",                data.tono],
        ["Duración",            data.duracion],
        ["Directora",           data.directora],
        ["Productora",          data.productora],
        ["Guionista",           data.guionista],
        ["Público Objetivo",    data.publico]
    ];
    const div = document.createElement("div");
    div.className = "message bot ficha-card";
    div.innerHTML = `
        <div class="ficha-title">🎬 Ficha Técnica</div>
        <img src="img/ideasprestadas.webp" class="ficha-portada" alt="Portada" style="cursor:zoom-in" onerror="this.style.display='none'">
        <div class="ficha-subtitle">${data.proyecto}</div>
        <table class="ficha-table">
            ${fields.map(([k,v]) => `<tr><td class="ficha-key">${k}</td><td class="ficha-val">${v}</td></tr>`).join("")}
        </table>`;
    sandboxContent.appendChild(div);
}

function renderSbPresupuesto(data) {
    const div = document.createElement("div");
    div.className = "message bot presupuesto-card";
    div.innerHTML = `
        <div class="ficha-title">💰 Presupuesto Estimado</div>
        <div class="presupuesto-row">
            <span class="presupuesto-label">En Pesos Argentinos</span>
            <span class="presupuesto-amount ars">${data.ars}</span>
        </div>
        <div class="presupuesto-divider"></div>
        <div class="presupuesto-row">
            <span class="presupuesto-label">En Dólares</span>
            <span class="presupuesto-amount usd">${data.usd}</span>
        </div>`;
    sandboxContent.appendChild(div);
}

function renderSbFinanciacion(items) {

function renderSbMoodboard(response) {
    const loader2 = document.createElement("div");
    loader2.className = "message bot typing-indicator";
    loader2.innerHTML = "<span></span><span></span><span></span>";
    sandboxContent.appendChild(loader2);

    setTimeout(() => {
        loader2.remove();
        [response.slide1, response.slide2].forEach((slide, si) => {
            const cols  = si === 0 ? 5 : 4;
            const label = `Slide ${si+1} — Moodboard (${slide.length} imágenes)`;
            const div = document.createElement("div");
            div.className = "message bot moodboard-block";
            div.innerHTML = `
                <div class="ficha-title">${label}</div>
                <div class="moodboard-grid" style="--cols:${cols}">
                    ${slide.map((src, i) => {
                        const isPaleta = (i === slide.length - 1);
                        return `<div class="moodboard-cell ${isPaleta ? "paleta-cell" : ""}">
                            ${src ? `<img src="${src}" alt="Imagen ${i+1}" style="cursor:zoom-in">` : `<div class="moodboard-placeholder">${isPaleta ? "🎨 Paleta" : (i+1)}</div>`}
                        </div>`;
                    }).join("")}
                </div>`;
            sandboxContent.appendChild(div);
            div.querySelectorAll("img").forEach(img => {
                img.addEventListener("click", () => { if (typeof openLightbox === "function") openLightbox(img.src); });
            });
        });
    }, 1800);
}

function renderSbQR(response) {
    const d = document.createElement("div");
    d.className = "message bot qr-block";
    const link = document.createElement("a");
    link.href = response.qrUrl || "#";
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    const img = document.createElement("img");
    img.src = "img/qr.png";
    img.alt = "Código QR";
    link.appendChild(img);
    const caption = document.createElement("p");
    caption.className = "qr-caption";
    caption.textContent = (response.caption || "") + " (tocá para abrir)";
    d.appendChild(link);
    d.appendChild(caption);
    sandboxContent.appendChild(d);
}

/* ── Volver al menú desde el sandbox ── */
sandboxBackBtn.addEventListener("click", () => {
    sandboxPanel.classList.remove("active");
    sandboxContent.innerHTML = "";
    welcomeMenu.style.display = "";
});

/* ── Construir los chips del menú ── */
const welcomeChipsEl = document.getElementById("welcomeChips");
MENU_ITEMS.forEach(({ icon, label, key, highlight }) => {
    const btn = document.createElement("button");
    btn.className = "welcome-chip" + (highlight ? " welcome-chip--ai" : "");
    btn.innerHTML = `<span class="wc-icon">${icon}</span>${label}`;
    btn.addEventListener("click", () => {
        if (key === "__ai__") {
            /* Solo "Usar la IA" desbloquea el chat */
            unlockChat();
        } else {
            /* Todas las demás → sandbox dentro del overlay */
            showSandbox(key);
        }
    });
    welcomeChipsEl.appendChild(btn);
});

/* ── Desbloquear el chat (solo al elegir "Usar la IA") ── */
function unlockChat() {
    /* Cerrar overlay */
    document.getElementById("welcomeOverlay").classList.add("hidden");
    /* Quitar clase de bloqueo y el overlay */
    const mainArea = document.getElementById("mainArea");
    mainArea.classList.remove("chat-locked");
    const lockEl = document.getElementById("chatLockOverlay");
    if (lockEl) lockEl.remove();
    /* Foco en el input */
    setTimeout(() => document.getElementById("messageInput").focus(), 350);
}
