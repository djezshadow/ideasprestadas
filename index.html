<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NeuraScript</title>
<link rel="stylesheet" href="style.css">
<!-- Precarga el audio para que esté listo antes de que el usuario toque Empezar -->
<link rel="preload" href="sounds/Heavenly.mp3" as="audio" type="audio/mpeg">
<style>

/* ═══════════════════════════════════════
   SPLASH SCREEN
   ═══════════════════════════════════════ */
#splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: linear-gradient(160deg, #0414ff 0%, #0000cc 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity .7s ease, visibility .7s ease;
}

#splash.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

/* Fase 1: solo el botón */
#splashPhase1 {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeIn .5s ease .1s both;
}

/* Fase 2: logo + nombre + tagline — oculto hasta que el usuario toca */
#splashPhase2 {
    display: none;
    flex-direction: column;
    align-items: center;
}

#splashPhase2.active { display: flex; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

.splash-logo {
    width: 120px;
    opacity: 0;
    transform: scale(0.6);
    filter: drop-shadow(0 0 40px rgba(255,255,255,.5));
    animation: splashLogoIn 1s cubic-bezier(.34,1.56,.64,1) .1s forwards;
}

@keyframes splashLogoIn {
    to { opacity: 1; transform: scale(1); }
}

.splash-name {
    color: white;
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: .5px;
    opacity: 0;
    transform: translateY(14px);
    margin-top: 18px;
    text-shadow: 0 4px 30px rgba(100,100,255,.4);
    animation: splashTextIn .7s ease .9s forwards;
}

.splash-tagline {
    color: rgba(255,255,255,.5);
    font-size: 0.95rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    margin-top: 8px;
    animation: splashTextIn .6s ease 1.3s forwards;
}

@keyframes splashTextIn {
    to { opacity: 1; transform: translateY(0); }
}

.splash-start-btn {
    padding: 20px 64px;
    background: white;
    color: #0000cc;
    border: none;
    border-radius: 50px;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: .3px;
    cursor: pointer;
    box-shadow: 0 8px 40px rgba(0,0,0,.25), 0 0 60px rgba(255,255,255,.15);
    transition: transform .18s ease, box-shadow .18s ease;
    -webkit-tap-highlight-color: transparent;
}

.splash-start-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 14px 50px rgba(0,0,0,.3), 0 0 80px rgba(255,255,255,.2);
}

.splash-start-btn:active { transform: scale(0.97); }

/* ═══════════════════════════════════════
   WELCOME OVERLAY — chips grandes
   ═══════════════════════════════════════ */
#welcomeOverlay {
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(0, 0, 180, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    animation: fade .35s ease;
    transition: opacity .4s ease, visibility .4s ease;
    overflow-y: auto;
}

#welcomeOverlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

/* welcomeMenu ocupa todo el overlay centrado */
#welcomeMenu {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    gap: 16px;
}

/* Fila superior — Sobre Nosotros */
.welcome-row-top {
    width: 100%;
    max-width: 680px;
}

/* Fila inferior — Usar la IA */
.welcome-row-bottom {
    width: 100%;
    max-width: 680px;
}

/* Chip de Sobre Nosotros — ancho completo, tono más sutil */
.welcome-chip--sobrenosotros {
    grid-column: 1 / -1;
    width: 100%;
    background: rgba(255,255,255,.08);
    border-color: rgba(255,255,255,.22);
    font-size: clamp(0.88rem, 1.8vw, 1rem);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border-radius: 14px;
}
.welcome-chip--sobrenosotros .wc-icon {
    display: inline;
    font-size: 1.2rem;
    margin-bottom: 0;
}
.welcome-chip--sobrenosotros:hover {
    background: rgba(255,255,255,.15);
    border-color: rgba(255,255,255,.4);
    transform: translateY(-2px);
}

.welcome-heading {
    color: white;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 4px 20px rgba(0,0,200,.4);
}

.welcome-sub {
    color: rgba(255,255,255,.65);
    font-size: clamp(0.88rem, 2vw, 1rem);
    text-align: center;
    margin-bottom: 36px;
    max-width: 480px;
    line-height: 1.6;
}

.welcome-chips {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    max-width: 680px;
    width: 100%;
}

.welcome-chip {
    padding: 20px 14px;
    background: rgba(255,255,255,.12);
    border: 1.5px solid rgba(255,255,255,.28);
    border-radius: 18px;
    color: white;
    font-size: clamp(0.78rem, 1.5vw, 0.92rem);
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    line-height: 1.35;
    transition: background .18s ease, transform .15s ease, border-color .18s ease;
    -webkit-tap-highlight-color: transparent;
}

.welcome-chip:hover {
    background: rgba(255,255,255,.22);
    border-color: rgba(255,255,255,.55);
    transform: translateY(-3px);
}

.welcome-chip:active { transform: scale(0.96); }

.welcome-chip .wc-icon {
    display: block;
    font-size: 1.6rem;
    margin-bottom: 8px;
}

@media (max-width: 540px) {
    .welcome-chips {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }
    .welcome-chip { padding: 16px 10px; }
    .welcome-chip .wc-icon { font-size: 1.3rem; }
}

/* Opción destacada — Usar la IA */
.welcome-chip--ai {
    grid-column: 1 / -1;
    width: 60%;          /* un poco más ancho que sobrenosotros */
    margin: 0 auto;      /* centrado */
    background: rgba(255,255,255,.22);
    border-color: rgba(255,255,255,.7);
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    padding: 18px 20px;
    letter-spacing: .2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border-radius: 14px;
    box-shadow: 0 0 40px rgba(255,255,255,.1), inset 0 1px 0 rgba(255,255,255,.25);
}

.welcome-chip--ai .wc-icon {
    display: inline;
    font-size: 1.4rem;
    margin-bottom: 0;
}

.welcome-chip--ai:hover {
    background: rgba(255,255,255,.35);
    transform: translateY(-3px);
    box-shadow: 0 8px 50px rgba(255,255,255,.18);
}

@media (max-width: 540px) {
    .welcome-chip--ai { width: 80%; }
}

/* ═══════════════════════════════════════
   SANDBOX PANEL — respuesta dentro del overlay
   ═══════════════════════════════════════ */
#sandboxPanel {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px max(24px, env(safe-area-inset-bottom, 24px));
    overflow-y: auto;
    animation: sandboxIn .3s ease;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
}

#sandboxPanel.active {
    opacity: 1;
    pointer-events: all;
}

@keyframes sandboxIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
}

.sandbox-back-btn {
    align-self: flex-start;
    margin-bottom: 20px;
    padding: 9px 18px;
    background: rgba(255,255,255,.12);
    border: 1.5px solid rgba(255,255,255,.28);
    border-radius: 50px;
    color: rgba(255,255,255,.85);
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .18s ease;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
}
.sandbox-back-btn:hover {
    background: rgba(255,255,255,.22);
    color: white;
    transform: translateX(-2px);
}

.sandbox-content {
    width: 100%;
    max-width: 680px;
    animation: sandboxIn .35s ease .05s both;
}

/* Los mensajes bot dentro del sandbox usan los mismos estilos del chat */
.sandbox-content .message {
    margin-bottom: 12px;
}

/* ═══════════════════════════════════════
   SANDBOX FULLSCREEN — Sobre Nosotros
   ═══════════════════════════════════════ */

/* Cuando el panel tiene esta clase, el contenido ocupa toda la pantalla */
#sandboxPanel.sandbox--fullscreen {
    padding: 20px;                       /* padding visible → el contorno glass se ve */
    align-items: stretch;                /* el hijo se estira al ancho completo */
    justify-content: flex-start;
}

#sandboxPanel.sandbox--fullscreen .sandbox-back-btn {
    align-self: flex-start;
    margin-bottom: 16px;
    flex-shrink: 0;
}

/* El contenido ocupa todo el espacio restante */
#sandboxPanel.sandbox--fullscreen .sandbox-content {
    max-width: none;                     /* sin límite de ancho */
    flex: 1;                             /* crece para llenar el alto */
    animation: none;
}

/* La card de Sobre Nosotros en modo fullscreen */
.sandbox--fullscreen .ficha-card.sobre-nosotros-card {
    height: 100%;
    overflow-y: auto;
    border-radius: 16px;
    background: rgba(255,255,255,.1);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,.2);
    box-shadow: 0 0 0 1px rgba(255,255,255,.08),
                0 24px 80px rgba(0,0,60,.4);
    padding: 28px 24px;
}

/* Grid del equipo — tarjetas centradas con foto redonda */
.sobre-nosotros-equipo-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 16px;
}

/* Las dos últimas tarjetas (4ta y 5ta) se centran en la fila */
.sobre-nosotros-equipo-list .sobre-nosotros-miembro:nth-child(4) {
    grid-column: 1 / 2;
}
.sobre-nosotros-equipo-list .sobre-nosotros-miembro:nth-child(5) {
    grid-column: 3 / 4;
}

.sobre-nosotros-miembro {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
    padding: 18px 10px 16px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 18px;
    transition: background .2s ease, transform .2s ease, box-shadow .2s ease;
}
.sobre-nosotros-miembro:hover {
    background: rgba(255,255,255,.13);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,.2), 0 0 30px rgba(60,80,255,.12);
}

/* Foto redonda grande tipo avatar de perfil */
.sobre-nosotros-foto {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 3px solid rgba(255,255,255,.32);
    background: rgba(255,255,255,.08);
    flex-shrink: 0;
    margin-bottom: 12px;
    box-shadow: 0 0 0 4px rgba(255,255,255,.07), 0 4px 20px rgba(0,0,0,.25);
}
.sobre-nosotros-foto-placeholder {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: rgba(255,255,255,.08);
    border: 3px solid rgba(255,255,255,.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    flex-shrink: 0;
    margin-bottom: 12px;
}

.sobre-nosotros-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    width: 100%;
}

.sobre-nosotros-nombre {
    color: white;
    font-size: .86rem;
    font-weight: 800;
    line-height: 1.2;
}
.sobre-nosotros-rol {
    color: rgba(255,255,255,.45);
    font-size: .62rem;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 8px;
}
/* Descripción corta de cada integrante */
.sobre-nosotros-bio {
    color: rgba(255,255,255,.58);
    font-size: .73rem;
    line-height: 1.5;
    font-weight: 400;
    border-top: 1px solid rgba(255,255,255,.1);
    padding-top: 8px;
    width: 100%;
    text-align: center;
}

/* Botón "Ver Página Completa" */
.sobre-nosotros-fullpage-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    margin-top: 20px;
    padding: 16px 20px;
    background: white;
    color: #0000cc;
    border: none;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 6px 30px rgba(0,0,0,.2), 0 0 40px rgba(255,255,255,.08);
    transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: .2px;
}
.sobre-nosotros-fullpage-btn:hover {
    opacity: .92;
    transform: translateY(-2px);
    box-shadow: 0 10px 40px rgba(0,0,0,.3), 0 0 60px rgba(255,255,255,.12);
}
.sobre-nosotros-fullpage-btn:active { transform: scale(0.97); }

@media (max-width: 540px) {
    #sandboxPanel.sandbox--fullscreen { padding: 12px; }
    .sandbox--fullscreen .ficha-card.sobre-nosotros-card { padding: 18px 14px; border-radius: 12px; }
    /* En mobile: 2 columnas, las últimas 2 tarjetas se centran */
    .sobre-nosotros-equipo-list {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }
    .sobre-nosotros-equipo-list .sobre-nosotros-miembro:nth-child(4) {
        grid-column: auto;
    }
    .sobre-nosotros-equipo-list .sobre-nosotros-miembro:nth-child(5) {
        grid-column: auto;
    }
    /* La 5ta tarjeta sola en su fila → centrarla */
    .sobre-nosotros-equipo-list .sobre-nosotros-miembro:last-child:nth-child(odd) {
        grid-column: 1 / -1;
        max-width: calc(50% - 5px);
        margin: 0 auto;
    }
    .sobre-nosotros-foto { width: 60px; height: 60px; }
}

/* ═══════════════════════════════════════
   CHAT BLOQUEADO — overlay sobre el área principal
   ═══════════════════════════════════════ */
#chatLockOverlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    cursor: not-allowed;
    border-radius: inherit;
}

.main { position: relative; }

/* Input y chips deshabilitados visualmente */
.chat-locked .input-area,
.chat-locked .chips-bar {
    opacity: 0.35;
    pointer-events: none;
    filter: blur(1px);
    user-select: none;
}

/* ═══════════════════════════════════════
   BOTÓN LOGIN en topbar (usuario invitado)
   ═══════════════════════════════════════ */
.topbar-login-btn {
    flex-shrink: 0;
    padding: 7px 14px;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.3);
    border-radius: 20px;
    color: white;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: background .18s ease;
    -webkit-tap-highlight-color: transparent;
}
.topbar-login-btn:hover { background: rgba(255,255,255,.28); }

/* Badge "Invitado" en sidebar */
.sidebar-guest-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: rgba(255,200,0,.1);
    border: 1px solid rgba(255,200,0,.2);
    border-radius: 10px;
    margin-bottom: 12px;
    color: rgba(255,220,100,.8);
    font-size: 0.8rem;
    font-weight: 600;
}

.sidebar-guest-badge a {
    color: rgba(255,220,100,.95);
    text-decoration: none;
    font-weight: 700;
    margin-left: auto;
    font-size: 0.75rem;
}

/* ── Logos clickeables → menú principal ── */
#logoHomeBtn,
#logoHomeBtnDesktop,
#logoHomeBtnMobile {
    transition: opacity .18s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}
#logoHomeBtn:hover,
#logoHomeBtnDesktop:hover,
#logoHomeBtnMobile:hover { opacity: .65; }

</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     SPLASH DE INTRO
     ══════════════════════════════════════════ -->
<div id="splash">
    <!-- Fase 1: solo el botón -->
    <div id="splashPhase1">
        <button class="splash-start-btn" id="splashBtn">✦ Empezar</button>
    </div>
    <!-- Fase 2: animación del logo (oculta hasta click) -->
    <div id="splashPhase2">
        <img src="img/Neura 1.png" class="splash-logo" alt="NeuraScript">
        <div class="splash-name">NeuraScript</div>
        <div class="splash-tagline">Tu asistente de guion</div>
    </div>
</div>

<!-- ══════════════════════════════════════════
     WELCOME OVERLAY — chips grandes
     ══════════════════════════════════════════ -->
<div id="welcomeOverlay" class="hidden">

    <!-- Vista principal: el menú de chips -->
    <div id="welcomeMenu">
        <div class="welcome-heading">¿Qué querés explorar?</div>
        <div class="welcome-sub">Exploré el proyecto o entrá a la IA para escribir libremente.</div>

        <!-- ── Fila superior: Sobre Nosotros (sandbox) ── -->
        <div class="welcome-row-top" id="welcomeTop"></div>

        <!-- ── Grilla central: las 9 opciones editables ── -->
        <div class="welcome-chips" id="welcomeChips"></div>

        <!-- ── Fila inferior: Usar la IA (desbloquea el chat) ── -->
        <div class="welcome-row-bottom" id="welcomeBottom"></div>
    </div>

    <!-- Vista sandbox: respuesta de la opción elegida -->
    <div id="sandboxPanel">
        <button class="sandbox-back-btn" id="sandboxBackBtn">← Volver al menú</button>
        <div class="sandbox-content" id="sandboxContent"></div>
    </div>

</div>

<!-- Tap anywhere to dismiss keyboard on iPhone -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">

    <!-- ═══════════════════════════════════════
         SIDEBAR
         ═══════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-brand" id="logoHomeBtn" title="Volver al menú" style="cursor:pointer">
            <img src="img/Neura 1.png" class="sidebar-logo" alt="NeuraScript">
            <span class="sidebar-title">NeuraScript</span>
        </div>

        <!-- Usuario logueado o badge invitado — se inyecta por JS -->
        <div id="sidebarUserArea"></div>

        <button class="sidebar-new-chat" id="newChatBtn">
            <span class="icon">✦</span>
            Nuevo chat
        </button>

        <div class="sidebar-section-label">Recientes</div>
        <nav class="sidebar-history" id="historyList">
            <p class="sidebar-empty">Tus conversaciones aparecerán acá.</p>
        </nav>

        <button class="sidebar-clear-all" id="clearAllBtn" style="display:none">
            <span class="sidebar-link-icon">🗑</span>
            Borrar todo el historial
        </button>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-bottom">
            <a href="sobre-nosotros.html" class="sidebar-link">
                <span class="sidebar-link-icon">🎬</span>
                Sobre Nosotros
            </a>
            <a target="_blank" href="https://youtu.be/dQw4w9WgXcQ" class="sidebar-link">
                <span class="sidebar-link-icon">⚙</span>
                Configuración
            </a>
            <a target="_blank" href="https://youtu.be/dQw4w9WgXcQ" class="sidebar-link">
                <span class="sidebar-link-icon">✉</span>
                Contacto
            </a>
            <div class="sidebar-version">v1.0.0</div>
        </div>

    </aside>

    <!-- ═══════════════════════════════════════
         ÁREA PRINCIPAL
         ═══════════════════════════════════════ -->
    <div class="main chat-locked" id="mainArea">

        <!-- Bloqueo de chat hasta elegir "Usar la IA" -->
        <div id="chatLockOverlay"></div>

        <!-- Topbar mobile -->
        <div class="topbar">
            <button class="topbar-menu-btn" id="menuBtn" aria-label="Abrir menú">☰</button>
            <span class="topbar-title" id="logoHomeBtnMobile" title="Volver al menú" style="cursor:pointer">NeuraScript</span>
            <div class="topbar-spacer"></div>
            <!-- Botón login para invitados -->
            <div id="topbarLoginArea"></div>
        </div>

        <!-- Logo desktop -->
        <div class="logo-area">
            <span id="logoHomeBtnDesktop" title="Volver al menú"
                  style="cursor:pointer;display:inline-flex;flex-direction:column;
                         align-items:center;gap:inherit">
                <img src="img/Neura 1.png" class="logo" alt="NeuraScript">
                <div class="title">NeuraScript</div>
            </span>
        </div>

        <!-- Chat -->
        <div class="chat-container">
            <div id="chat" class="chat"></div>
        </div>

        <!-- Chips de sugerencias (pequeños, siempre visibles) -->
        <div class="chips-bar" id="chipsBar"></div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-box">
                <input
                    id="messageInput"
                    placeholder="Escribe tu idea de guion..."
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="sentences"
                >
                <button id="sendBtn" class="send-btn" aria-label="Enviar">➤</button>
            </div>
        </div>

        <div class="safari-bottom-fill"></div>

    </div>

</div>

<script>
/* ─── Auth: siempre se entra directo. Login/Register es opcional. ─── */
const _token = localStorage.getItem("ns_token");

/* ═══════════════════════════════════════════════════════════

   Cada objeto tiene:

     label → texto del botón
     key   → palabra clave que se busca en BOT_RESPONSES
              (y en ALIASES) de script.js

   Para AGREGAR una opción: copiá un bloque { ... } con su coma.
   Para ELIMINAR una opción: borrá el bloque completo.
   Para CAMBIAR el contenido que muestra: editá BOT_RESPONSES
   en script.js buscando la key correspondiente.
   ─────────────────────────────────────────────────────────── */

/* ─── SANDBOX: render de respuesta dentro del overlay ─── */
const welcomeMenu    = document.getElementById("welcomeMenu");
const sandboxPanel   = document.getElementById("sandboxPanel");
const sandboxContent = document.getElementById("sandboxContent");
const sandboxBackBtn = document.getElementById("sandboxBackBtn");

function showSandbox(key) {
    /* Ocultar menú, mostrar panel */
    welcomeMenu.style.display = "none";
    sandboxPanel.classList.add("active");
    sandboxPanel.classList.remove("sandbox--fullscreen");
    sandboxContent.innerHTML = "";

    /* Render de la respuesta usando el mismo BOT_RESPONSES de script.js.
       Necesitamos esperar a que script.js esté cargado — usamos un pequeño
       retry si aún no está disponible. */
    function tryRender() {
        /* Caso especial: Sobre Nosotros se renderiza directo sin BOT_RESPONSES */
        if (key === "__sobrenosotros__") {
            const loader = document.createElement("div");
            loader.className = "message bot typing-indicator";
            loader.innerHTML = "<span></span><span></span><span></span>";
            sandboxContent.appendChild(loader);
            setTimeout(() => {
                loader.remove();
                renderSbSobreNosotros();
            }, 900);
            return;
        }

        if (typeof BOT_RESPONSES === "undefined") {
            return setTimeout(tryRender, 50);
        }

        /* Resolver alias */
        const resolvedKey = (typeof ALIASES !== "undefined" && ALIASES[key]) ? ALIASES[key] : key;
        const response = BOT_RESPONSES[resolvedKey];

        if (!response) {
            sandboxContent.innerHTML = `<div class="message bot" style="opacity:.7">No hay información disponible para esta sección todavía.</div>`;
            return;
        }

        /* Indicador de carga */
        const loader = document.createElement("div");
        loader.className = "message bot typing-indicator";
        loader.innerHTML = "<span></span><span></span><span></span>";
        sandboxContent.appendChild(loader);

        const delay = response.delay || 1200;

        setTimeout(() => {
            loader.remove();
            renderSandboxResponse(response, resolvedKey);
        }, delay);
    }
    tryRender();
}

function renderSandboxResponse(response, key) {
    /* Redirige al mismo sistema de render de script.js
       pero dentro de sandboxContent en lugar del chat global */

    /* Helper local para crear elementos dentro del sandbox */
    function sbAppend(el) {
        sandboxContent.appendChild(el);
    }
    function sbText(text) {
        const d = document.createElement("div");
        d.className = "message bot";
        d.textContent = text;
        sbAppend(d);
    }
    function sbScript(text) {
        const d = document.createElement("div");
        d.className = "message bot script";
        d.textContent = text;
        sbAppend(d);
    }
    function sbList(items) {
        const d = document.createElement("div");
        d.className = "message bot";
        const ul = document.createElement("ul");
        ul.className = "message-list";
        items.forEach(i => { const li = document.createElement("li"); li.textContent = i; ul.appendChild(li); });
        d.appendChild(ul);
        sbAppend(d);
    }

    /* Elegir variante */
    let content = response.content;
    if (response.multi && response.variants && response.variants.length > 0) {
        content = response.variants[Math.floor(Math.random() * response.variants.length)];
    }

    switch (response.type) {
        case "text":
            sbText(content);
            break;
        case "script":
            sbScript(content);
            break;
        case "list":
            sbList(content);
            break;
        case "ficha":
            renderSbFicha(response.content);
            break;
        case "presupuesto":
            renderSbPresupuesto(response.content);
            break;
        case "financiacion":
            renderSbFinanciacion(response.content);
            break;
        case "elenco":
            renderSbElenco(response.content);
            break;
        case "moodboard":
            renderSbMoodboard(response);
            break;
        case "recorrido":
            renderSbRecorrido();
            break;
        case "youtube":
            renderSbYoutube(response);
            break;
        case "qr":
            renderSbQR(response);
            break;
        default:
            sbText(content || "");
    }

    /* Lightbox en imágenes del sandbox */
    sandboxContent.querySelectorAll("img").forEach(img => {
        img.style.cursor = "zoom-in";
        img.addEventListener("click", () => {
            if (typeof openLightbox === "function") openLightbox(img.src);
        });
    });
}

function renderSbMoodboard(response) {
    const loader2 = document.createElement("div");
    loader2.className = "message bot typing-indicator";
    loader2.innerHTML = "<span></span><span></span><span></span>";
    sandboxContent.appendChild(loader2);

    setTimeout(() => {
        loader2.remove();
        [response.slide1, response.slide2].forEach((slide, si) => {
            const cols  = si === 0 ? 5 : 4;
            const label = `Slide ${si+1} — Moodboard (${slide.length} imágenes)`;
            const div = document.createElement("div");
            div.className = "message bot moodboard-block";
            div.innerHTML = `
                <div class="ficha-title">${label}</div>
                <div class="moodboard-grid" style="--cols:${cols}">
                    ${slide.map((src, i) => {
                        const isPaleta = (i === slide.length - 1);
                        return `<div class="moodboard-cell ${isPaleta ? "paleta-cell" : ""}">
                            ${src ? `<img src="${src}" alt="Imagen ${i+1}" style="cursor:zoom-in">` : `<div class="moodboard-placeholder">${isPaleta ? "🎨 Paleta" : (i+1)}</div>`}
                        </div>`;
                    }).join("")}
                </div>`;
            sandboxContent.appendChild(div);
            div.querySelectorAll("img").forEach(img => {
                img.addEventListener("click", () => { if (typeof openLightbox === "function") openLightbox(img.src); });
            });
        });
    }, 1800);
}

    link.target = "_blank";
    link.rel = "noopener noreferrer";
    const img = document.createElement("img");
    img.src = "img/qr.png";
    img.alt = "Código QR";
    link.appendChild(img);
    const caption = document.createElement("p");
    caption.className = "qr-caption";
    caption.textContent = (response.caption || "") + " (tocá para abrir)";
    d.appendChild(link);
    d.appendChild(caption);
    sandboxContent.appendChild(d);
}

/* ── Ir al menú principal (salteando la animación) ── */
function goHome() {
    /* 1. Resetear sandbox por si estaba abierto */
    sandboxPanel.classList.remove("active");
    sandboxPanel.classList.remove("sandbox--fullscreen");
    sandboxContent.innerHTML = "";
    welcomeMenu.style.display = "";

    /* 2. Cerrar sidebar mobile si está abierto */
    if (typeof closeSidebar === "function") closeSidebar();

    /* 3. Mostrar el overlay del menú directamente (sin splash) */
    document.getElementById("splash").classList.add("hidden");
    document.getElementById("welcomeOverlay").classList.remove("hidden");

    /* 4. Re-bloquear el chat (por si ya había entrado a "Usar la IA") */
    const mainArea = document.getElementById("mainArea");
    if (!mainArea.classList.contains("chat-locked")) {
        mainArea.classList.add("chat-locked");
        /* Reinsertar el overlay de bloqueo si fue eliminado */
        if (!document.getElementById("chatLockOverlay")) {
            const lock = document.createElement("div");
            lock.id = "chatLockOverlay";
            mainArea.insertBefore(lock, mainArea.firstChild);
        }
    }
}

/* Conectar los tres puntos de acceso al logo */
document.addEventListener("DOMContentLoaded", () => {
    ["logoHomeBtn", "logoHomeBtnDesktop", "logoHomeBtnMobile"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener("click", goHome);
    });
});

/* ── Detectar #menu en la URL al cargar (viene de sobre-nosotros) ── */
window.addEventListener("load", () => {
    if (window.location.hash === "#menu") {
        /* Limpiar el hash sin recargar */
        history.replaceState(null, "", window.location.pathname);
        /* Abrir el menú directamente */
        goHome();
    }
});

/* ── Desbloquear el chat (solo al elegir "Usar la IA") ── */
function unlockChat() {
    /* Cerrar overlay */
    document.getElementById("welcomeOverlay").classList.add("hidden");
    /* Quitar clase de bloqueo y el overlay */
    const mainArea = document.getElementById("mainArea");
    mainArea.classList.remove("chat-locked");
    const lockEl = document.getElementById("chatLockOverlay");
    if (lockEl) lockEl.remove();
    /* Foco en el input */
    setTimeout(() => document.getElementById("messageInput").focus(), 350);
}
